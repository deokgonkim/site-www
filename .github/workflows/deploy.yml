name: Build and deploy

on:
  push:
    branches:
      - '*'

env:
  GOOGLE_ADS_ID: ${{ secrets.GOOGLE_ADS_ID }}
  GOOGLE_TM_ID: ${{ secrets.GOOGLE_TM_ID }}
  GOOGLE_GA_ID: ${{ secrets.GOOGLE_GA_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: aws
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: "0.159.1"
        extended: true

    - name: Pre-build
      run: cd themes; sh doit.sh; sh geekblog.sh

    - name: Pre-build phase2
      run: cd layouts; sh apply-custom.sh

    # - name: Build
    #   # remove --minify tag if you do not need it
    #   # docs: https://gohugo.io/hugo-pipes/minification/
    #   run: hugo

    - name: 'Build dgkim.net'
      uses: './.github/actions/build'
      with:
        config-file: config.dgkim.net.toml

    # - name: 'Build deokgon.kim'
    #   uses: './.github/actions/build'
    #   with:
    #     # config-file: config.deokgon.kim.toml
    #     config-file: config.dgkim.net.toml

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: public
        path: public/
        retention-days: 7

  deploy-dgkim-net:
    needs: build
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-dgkim-net.yml
    secrets: inherit

  deploy-deokgon-kim:
    needs: build
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-deokgon-kim.yml
    secrets: inherit
